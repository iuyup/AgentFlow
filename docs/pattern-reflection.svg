<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="720" height="180" rx="12" fill="url(#bg)"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.3"/>
  </pattern>
  <rect width="720" height="180" rx="12" fill="url(#grid)" opacity="0.3"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-family="'SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#14b8a6">🔄 Reflection Pattern</text>
  <text x="360" y="44" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#475569">Iterative Self-Improvement</text>

  <!-- START node -->
  <circle cx="52" cy="100" r="18" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="52" y="104" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="600" fill="#94a3b8">START</text>

  <!-- Arrow START → Write -->
  <line x1="70" y1="100" x2="118" y2="100" stroke="#475569" stroke-width="1.2"/>
  <polygon points="116,96 124,100 116,104" fill="#475569"/>

  <!-- Write node -->
  <rect x="126" y="80" width="100" height="40" rx="8" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="176" y="96" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#14b8a6">✍️ Write</text>
  <text x="176" y="110" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#475569">generate draft</text>

  <!-- Arrow Write → Review -->
  <line x1="226" y1="100" x2="274" y2="100" stroke="#475569" stroke-width="1.2"/>
  <polygon points="272,96 280,100 272,104" fill="#475569"/>

  <!-- Review node -->
  <rect x="282" y="80" width="100" height="40" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="332" y="96" text-anchor="middle" font-family="'SF Mono',monospace" font-size="10" fill="#06b6d4">📝 Review</text>
  <text x="332" y="110" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#475569">score 1-10</text>

  <!-- Arrow Review → Decision -->
  <line x1="382" y1="100" x2="430" y2="100" stroke="#475569" stroke-width="1.2"/>
  <polygon points="428,96 436,100 428,104" fill="#475569"/>

  <!-- Decision diamond -->
  <polygon points="488,72 538,100 488,128 438,100" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="488" y="96" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="600" fill="#f59e0b">score</text>
  <text x="488" y="108" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="600" fill="#f59e0b">≥ 8?</text>

  <!-- Arrow Decision → END (Yes) -->
  <line x1="538" y1="100" x2="600" y2="100" stroke="#22c55e" stroke-width="1.2"/>
  <polygon points="598,96 606,100 598,104" fill="#22c55e"/>
  <text x="569" y="93" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="600" fill="#22c55e">Yes</text>

  <!-- END node -->
  <circle cx="630" cy="100" r="18" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="630" y="104" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="600" fill="#22c55e">END</text>

  <!-- Loop back arrow (No) -->
  <path d="M 488,128 L 488,155 L 176,155 L 176,120" stroke="#ef4444" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="172,122 176,114 180,122" fill="#ef4444"/>
  <text x="332" y="150" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="600" fill="#ef4444">No → revise with feedback</text>

  <!-- Max iterations note -->
  <text x="488" y="168" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#475569">or max_iterations reached → END</text>
</svg>
